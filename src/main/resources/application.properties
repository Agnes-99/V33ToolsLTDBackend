spring.jpa.hibernate.ddl-auto=update

# 1. UNCOMMENT THESE LINES so they look at Render's dashboard environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Keep your context path active so your frontend links don't break
server.servlet.context-path=/v33tools
server.port=8080

# 3. JWT configuration
jwt.secret=YourSuperSecretKeyThatIsAtLeast32CharactersLong123456
jwt.expiration=3600000